name: ci 
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material 
      # Fetch the latest kod website files
      # TODO fix double archiving issue
      - run: mkdir -p docs/site/kod ; cd docs/site/kod ; wget -O site.zip https://github.com/bilberrysoftware/kod/releases/latest/download/kod-docs-website.zip ;  unzip site.zip; tar xzf kod.tar.gz --strip-components=2 ; rm site.zip kod.tar.gz; ls -la
      - run: mkdocs gh-deploy --force --dirty -d docs/site
